name: Release WhatsApp Bridge

on:
  push:
    tags:
      - "bridge/v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.2)"
        required: true
        type: string

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set.outputs.version }}
      ref_to_use: ${{ steps.ref.outputs.ref_to_use }}
    steps:
      - id: set
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/bridge/v}" >> $GITHUB_OUTPUT
          fi

      - id: ref
        run: echo "ref_to_use=${{ github.ref }}" >> $GITHUB_OUTPUT

  build:
    runs-on: ubuntu-latest
    needs: version
    defaults:
      run:
        working-directory: bridges/whatsapp

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.ref_to_use }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update package version
        run: npm version ${{ needs.version.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Pack tarball
        run: npm pack

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: whatsapp-bridge-tarball
          path: bridges/whatsapp/specialagent-whatsapp-bridge-*.tgz

  github-release:
    runs-on: ubuntu-latest
    needs: [version, build]
    permissions:
      contents: write

    steps:
      - name: Download tarball
        uses: actions/download-artifact@v4
        with:
          name: whatsapp-bridge-tarball
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: bridge/v${{ needs.version.outputs.version }}
          name: "WhatsApp Bridge v${{ needs.version.outputs.version }}"
          generate_release_notes: false
          draft: false
          files: dist/*.tgz
          body: |
            ## @specialagent/whatsapp-bridge v${{ needs.version.outputs.version }}

            Install directly from this release (no npm registry required):

            ```bash
            npm install https://github.com/taylorelley/specops/releases/download/bridge%2Fv${{ needs.version.outputs.version }}/specialagent-whatsapp-bridge-${{ needs.version.outputs.version }}.tgz
            ```

            Or pin it in `package.json`:

            ```json
            "@specialagent/whatsapp-bridge": "https://github.com/taylorelley/specops/releases/download/bridge%2Fv${{ needs.version.outputs.version }}/specialagent-whatsapp-bridge-${{ needs.version.outputs.version }}.tgz"
            ```
