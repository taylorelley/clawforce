agents:
  defaults:
    model: anthropic/claude-sonnet-4
    max_tokens: 8192
    temperature: 0.7

providers: {}
channels: {}
tools:
  restrict_to_workspace: true
  exec:
    policy:
      relaxed: true
  approval:
    default_mode: always_run
    per_tool: {}
    timeout_seconds: 120

security:
  docker:
    level: privileged
